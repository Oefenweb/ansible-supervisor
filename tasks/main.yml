# tasks file
---
- name: install native
  ansible.builtin.import_tasks: install-native.yml
  when: supervisor_install_method == 'native'
  tags:
    - configuration
    - supervisor
    - supervisor-install-native

- name: install pip
  ansible.builtin.import_tasks: install-pip.yml
  when: supervisor_install_method == 'pip'
  tags:
    - configuration
    - supervisor
    - supervisor-install-pip

- name: configure
  ansible.builtin.import_tasks: configure.yml
  tags:
    - configuration
    - supervisor
    - supervisor-configure

- name: service initd
  ansible.builtin.import_tasks: service-initd.yml
  when: ansible_facts['service_mgr'] != 'systemd'
  tags:
    - configuration
    - supervisor
    - supervisor-configure
    - supervisor-configure-initd

- name: service systemd
  ansible.builtin.import_tasks: service-systemd.yml
  when: ansible_facts['service_mgr'] == 'systemd'
  tags:
    - configuration
    - supervisor
    - supervisor-configure
    - supervisor-configure-systemd

- name: programs
  ansible.builtin.import_tasks: programs.yml
  tags:
    - configuration
    - supervisor
    - supervisor-programs

- name: groups
  ansible.builtin.import_tasks: groups.yml
  tags:
    - configuration
    - supervisor
    - supervisor-groups

- name: start and enable service
  ansible.builtin.service:
    name: "{{ supervisor_package_name }}"
    state: "{{ service_default_state | default('started') }}"
    enabled: "{{ service_default_enabled | default(true) | bool }}"
  tags:
    - configuration
    - supervisor
    - supervisor-start-enable-service
